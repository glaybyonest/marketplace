openapi: 3.0.3
info:
  title: Marketplace API
  version: 1.0.0
  description: |
    OpenAPI specification for the marketplace backend.

    The API uses a consistent envelope format:
    - successful responses: `{ "data": ... }`
    - errors: `{ "error": { "code", "message", "details" } }`
servers:
  - url: http://localhost:8080
    description: Local development server
  - url: /
    description: Relative server URL for reverse proxy setups
tags:
  - name: Health
    description: Service availability and observability endpoints
  - name: Auth
    description: Authentication, sessions, email verification, and password reset
  - name: Catalog
    description: Public catalog endpoints
  - name: Search
    description: Search suggestions and popular queries
  - name: Profile
    description: Authenticated user profile
  - name: Favorites
    description: Favorite products for the current user
  - name: Cart
    description: Server-side shopping cart
  - name: Places
    description: Saved user addresses
  - name: Orders
    description: Checkout and order history
  - name: Recommendations
    description: Personalized product recommendations
  - name: Admin
    description: Admin backoffice endpoints for categories and products
paths:
  /healthz:
    get:
      tags: [Health]
      operationId: healthz
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
              examples:
                ok:
                  value:
                    data:
                      status: ok
  /readyz:
    get:
      tags: [Health]
      operationId: readyz
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyEnvelope'
              examples:
                ready:
                  value:
                    data:
                      status: ready
        '503':
          $ref: '#/components/responses/NotReadyResponse'
  /metrics:
    get:
      tags: [Health]
      operationId: metrics
      summary: Prometheus metrics endpoint
      description: Exposes metrics in Prometheus text exposition format.
      responses:
        '200':
          description: Metrics payload
          content:
            text/plain:
              schema:
                type: string
              examples:
                sample:
                  value: |
                    # HELP marketplace_http_requests_total Total HTTP requests processed.
                    # TYPE marketplace_http_requests_total counter
                    marketplace_http_requests_total{method="GET",route="/healthz",status="200"} 12
  /api/v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  email: user@example.com
                  password: Secure123
                  full_name: Ivan Petrov
      responses:
        '201':
          description: User created; email verification is required before login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResultEnvelope'
              examples:
                created:
                  value:
                    data:
                      user:
                        id: 7d4c4e98-42ba-4f55-86db-9f3d2772e6c1
                        email: user@example.com
                        full_name: Ivan Petrov
                        role: customer
                        is_active: true
                        is_email_verified: false
                        created_at: '2026-03-13T18:10:00Z'
                        updated_at: '2026-03-13T18:10:00Z'
                      requires_email_verification: true
                      message: verification email sent
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: user@example.com
                  password: Secure123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResultEnvelope'
              examples:
                success:
                  value:
                    data:
                      user:
                        id: 7d4c4e98-42ba-4f55-86db-9f3d2772e6c1
                        email: user@example.com
                        full_name: Ivan Petrov
                        role: customer
                        is_active: true
                        email_verified_at: '2026-03-13T18:15:00Z'
                        is_email_verified: true
                        created_at: '2026-03-13T18:10:00Z'
                        updated_at: '2026-03-13T18:15:00Z'
                      tokens:
                        access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access.signature
                        refresh_token: 1f9f7b7c-92a1-4c8f-b6de-bdfe94eebfef.secret
                        token_type: Bearer
                        expires_in: 900
                      requires_email_verification: false
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/EmailNotVerifiedResponse'
        '429':
          description: Login endpoint is rate-limited or the account is temporarily locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                rateLimited:
                  $ref: '#/components/examples/RateLimitedExample'
                loginLocked:
                  $ref: '#/components/examples/LoginLockedExample'
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfterHeader'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshTokens
      summary: Rotate refresh token and obtain a new token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              default:
                value:
                  refresh_token: 1f9f7b7c-92a1-4c8f-b6de-bdfe94eebfef.secret
      responses:
        '200':
          description: Token pair rotated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/RefreshUnauthorizedResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/auth/verify-email/request:
    post:
      tags: [Auth]
      operationId: requestEmailVerification
      summary: Request a new email verification link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
            examples:
              default:
                value:
                  email: user@example.com
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/auth/verify-email/confirm:
    post:
      tags: [Auth]
      operationId: confirmEmailVerification
      summary: Confirm email verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailConfirmRequest'
            examples:
              default:
                value:
                  token: verify_3e85ce8092e64c79a7e0b0b15da20148
      responses:
        '200':
          description: Email confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailEnvelope'
        '400':
          $ref: '#/components/responses/InvalidTokenResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/auth/password-reset/request:
    post:
      tags: [Auth]
      operationId: requestPasswordReset
      summary: Request a password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
            examples:
              default:
                value:
                  email: user@example.com
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/auth/password-reset/confirm:
    post:
      tags: [Auth]
      operationId: confirmPasswordReset
      summary: Confirm password reset token and set a new password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
            examples:
              default:
                value:
                  token: reset_89e2ec8252f24b9fa8f0fd22ad4e2f0d
                  new_password: NewSecure123
      responses:
        '200':
          description: Password reset completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetEnvelope'
        '400':
          $ref: '#/components/responses/InvalidTokenResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke a refresh token for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Refresh token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokedEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: authMe
      summary: Get the current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/categories:
    get:
      tags: [Catalog]
      operationId: listCategoriesTree
      summary: Get the category tree
      responses:
        '200':
          description: Nested category tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTreeEnvelope'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/categories/slug/{slug}:
    get:
      tags: [Catalog]
      operationId: getCategoryBySlug
      summary: Get a category by slug
      parameters:
        - $ref: '#/components/parameters/SlugPathParam'
      responses:
        '200':
          description: Category found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/categories/{id}:
    get:
      tags: [Catalog]
      operationId: getCategoryById
      summary: Get a category by ID
      parameters:
        - $ref: '#/components/parameters/CategoryIDPathParam'
      responses:
        '200':
          description: Category found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/search/suggestions:
    get:
      tags: [Search]
      operationId: searchSuggestions
      summary: Get search suggestions
      parameters:
        - $ref: '#/components/parameters/SearchQueryParam'
        - $ref: '#/components/parameters/SuggestionsLimitParam'
      responses:
        '200':
          description: Suggestions list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSuggestionsEnvelope'
              examples:
                default:
                  value:
                    data:
                      - text: cement
                        kind: product
                      - text: cement plaster
                        kind: query
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/search/popular:
    get:
      tags: [Search]
      operationId: popularSearches
      summary: Get popular search queries
      parameters:
        - $ref: '#/components/parameters/PopularLimitParam'
      responses:
        '200':
          description: Popular queries list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularSearchesEnvelope'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/products:
    get:
      tags: [Catalog]
      operationId: listProducts
      summary: List products with filtering, sorting, and pagination
      parameters:
        - $ref: '#/components/parameters/SearchQueryParam'
        - $ref: '#/components/parameters/CategoryIDQueryParam'
        - $ref: '#/components/parameters/MinPriceParam'
        - $ref: '#/components/parameters/MaxPriceParam'
        - $ref: '#/components/parameters/InStockParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/products/slug/{slug}:
    get:
      tags: [Catalog]
      operationId: getProductBySlug
      summary: Get a product by slug
      parameters:
        - $ref: '#/components/parameters/SlugPathParam'
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/products/{id}:
    get:
      tags: [Catalog]
      operationId: getProductById
      summary: Get a product by ID
      parameters:
        - $ref: '#/components/parameters/ProductIDPathParam'
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/profile:
    get:
      tags: [Profile]
      operationId: getProfile
      summary: Get the current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
    patch:
      tags: [Profile]
      operationId: updateProfile
      summary: Update profile fields
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            examples:
              default:
                value:
                  full_name: Ivan Sergeevich Petrov
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/favorites:
    get:
      tags: [Favorites]
      operationId: listFavorites
      summary: List favorite products for the current user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated favorite products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/favorites/{product_id}:
    post:
      tags: [Favorites]
      operationId: addFavorite
      summary: Add a product to favorites
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIDPathParamNamed'
      responses:
        '200':
          description: Favorite state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
    delete:
      tags: [Favorites]
      operationId: deleteFavorite
      summary: Remove a product from favorites
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIDPathParamNamed'
      responses:
        '200':
          description: Favorite removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/cart:
    get:
      tags: [Cart]
      operationId: getCart
      summary: Get the current user cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
    delete:
      tags: [Cart]
      operationId: clearCart
      summary: Clear the current user cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartEnvelope'
              examples:
                empty:
                  value:
                    data:
                      items: []
                      total_amount: 0
                      currency: RUB
                      total_items: 0
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/cart/items:
    post:
      tags: [Cart]
      operationId: addCartItem
      summary: Add a product to the cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRequest'
            examples:
              default:
                value:
                  product_id: 3a8b7c10-826a-4046-8b95-93a235e4e0a1
                  quantity: 2
      responses:
        '201':
          description: Updated cart after adding an item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ProductConflictResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/cart/items/{product_id}:
    patch:
      tags: [Cart]
      operationId: updateCartItem
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIDPathParamNamed'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
            examples:
              default:
                value:
                  quantity: 4
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ProductConflictResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
    delete:
      tags: [Cart]
      operationId: deleteCartItem
      summary: Remove an item from the cart
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIDPathParamNamed'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/places:
    get:
      tags: [Places]
      operationId: listPlaces
      summary: List saved places for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Places list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlacesEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
    post:
      tags: [Places]
      operationId: createPlace
      summary: Create a saved place
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaceRequest'
            examples:
              default:
                value:
                  title: Home
                  address_text: Moscow, Tverskaya 1
                  lat: 55.7558
                  lon: 37.6173
      responses:
        '201':
          description: Place created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/v1/places/{id}:
    patch:
      tags: [Places]
      operationId: updatePlace
      summary: Update a saved place
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PlaceIDPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlaceRequest'
            examples:
              default:
                value:
                  title: Office
      responses:
        '200':
          description: Place updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceEnvelope'
        '400':
          $ref: '#/components/responses/InvalidInputResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
    delete:
