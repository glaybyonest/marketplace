components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  headers:
    RetryAfterHeader:
      description: Number of seconds until the client may retry the request.
      schema:
        type: integer
        minimum: 1
        example: 60
  examples:
    RateLimitedExample:
      value:
        error:
          code: rate_limited
          message: too many requests
          details:
            scope: auth_login
            retry_after_seconds: 60
    LoginLockedExample:
      value:
        error:
          code: login_locked
          message: account is temporarily locked
          details:
            retry_after_seconds: 900
            locked_until: '2026-03-13T18:30:00Z'
  parameters:
    SearchQueryParam:
      name: q
      in: query
      description: Search query for product name, description, brand, slug, SKU, and category.
      required: false
      schema:
        type: string
      example: cement
    CategoryIDQueryParam:
      name: category_id
      in: query
      description: Filter by category ID.
      required: false
      schema:
        type: string
        format: uuid
      example: 6b997cc0-e76e-4c2f-a0a4-79a9a407f2cc
    MinPriceParam:
      name: min_price
      in: query
      required: false
      schema:
        type: number
        format: double
      example: 100
    MaxPriceParam:
      name: max_price
      in: query
      required: false
      schema:
        type: number
        format: double
      example: 1000
    InStockParam:
      name: in_stock
      in: query
      required: false
      schema:
        type: boolean
      example: true
    AdminIsActiveParam:
      name: is_active
      in: query
      description: Filter admin product list by active flag.
      required: false
      schema:
        type: boolean
      example: false
    SortParam:
      name: sort
      in: query
      required: false
      schema:
        type: string
        enum: [new, price_asc, price_desc]
      example: new
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    SuggestionsLimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 20
        default: 8
      example: 8
    PopularLimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 20
        default: 6
      example: 6
    RecommendationsLimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 12
    SlugPathParam:
      name: slug
      in: path
      required: true
      schema:
        type: string
      example: dry-mixes
    CategoryIDPathParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 6b997cc0-e76e-4c2f-a0a4-79a9a407f2cc
    ProductIDPathParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 3a8b7c10-826a-4046-8b95-93a235e4e0a1
    ProductIDPathParamNamed:
      name: product_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 3a8b7c10-826a-4046-8b95-93a235e4e0a1
    PlaceIDPathParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: f6d1cb07-b8db-4220-9ab2-bd661e74fb0c
    OrderIDPathParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 9ca2b8bc-f925-4df5-9880-34b310ae2f67
  responses:
    InvalidInputResponse:
      description: Invalid request payload or malformed parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            invalidInput:
              value:
                error:
                  code: invalid_input
                  message: invalid input
    RateLimitedResponse:
      description: Too many requests for the same endpoint from the same client.
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfterHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            rateLimited:
              $ref: '#/components/examples/RateLimitedExample'
    InvalidTokenResponse:
      description: Invalid, expired, or already consumed token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            invalidToken:
              value:
                error:
                  code: invalid_token
                  message: invalid or expired token
    UnauthorizedResponse:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            unauthorized:
              value:
                error:
                  code: unauthorized
                  message: unauthorized
    RefreshUnauthorizedResponse:
      description: Refresh session is invalid, closed, or token was reused
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            sessionClosed:
              value:
                error:
                  code: session_closed
                  message: session is closed
            tokenReused:
              value:
                error:
                  code: refresh_token_reused
                  message: refresh token already used
    EmailNotVerifiedResponse:
      description: User email must be verified before login or protected access
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            emailNotVerified:
              value:
                error:
                  code: email_not_verified
                  message: email is not verified
    ForbiddenResponse:
      description: Authenticated but not allowed to access the resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            forbidden:
              value:
                error:
                  code: forbidden
                  message: forbidden
    NotFoundResponse:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            notFound:
              value:
                error:
                  code: not_found
                  message: resource not found
    ConflictResponse:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            conflict:
              value:
                error:
                  code: conflict
                  message: resource conflict
    ProductConflictResponse:
      description: Product cannot be added or checked out because of stock or active state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            insufficientStock:
              value:
                error:
                  code: insufficient_stock
                  message: insufficient stock
            productUnavailable:
              value:
                error:
                  code: product_unavailable
                  message: product unavailable
    CartEmptyOrInvalidInputResponse:
      description: Checkout cannot proceed because the cart is empty or the request is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            cartEmpty:
              value:
                error:
                  code: cart_empty
                  message: cart is empty
            invalidInput:
              value:
                error:
                  code: invalid_input
                  message: invalid input
    NotReadyResponse:
      description: Service dependencies are not ready
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            notReady:
              value:
                error:
                  code: not_ready
                  message: database is not ready
    InternalErrorResponse:
      description: Unexpected internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            internalError:
              value:
                error:
                  code: internal_error
                  message: internal server error
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: invalid_input
        message:
          type: string
          example: invalid input
        details:
          nullable: true
          description: Optional structured error details.
    HealthEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [status]
          properties:
            status:
              type: string
              example: ok
    ReadyEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [status]
          properties:
            status:
              type: string
              example: ready
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: Secure123
        full_name:
          type: string
          maxLength: 120
          example: Ivan Petrov
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: Secure123
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          minLength: 20
          example: 1f9f7b7c-92a1-4c8f-b6de-bdfe94eebfef.secret
    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          minLength: 20
          example: 1f9f7b7c-92a1-4c8f-b6de-bdfe94eebfef.secret
    VerifyEmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
    VerifyEmailConfirmRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 20
          example: verify_3e85ce8092e64c79a7e0b0b15da20148
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
    PasswordResetConfirmRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
          minLength: 20
          example: reset_89e2ec8252f24b9fa8f0fd22ad4e2f0d
        new_password:
          type: string
          minLength: 8
          maxLength: 72
          example: NewSecure123
    UpdateProfileRequest:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 120
          example: Ivan Sergeevich Petrov
    User:
      type: object
      required:
        [id, email, role, is_active, is_email_verified, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          example: 7d4c4e98-42ba-4f55-86db-9f3d2772e6c1
        email:
          type: string
          format: email
          example: user@example.com
        full_name:
          type: string
          example: Ivan Petrov
        role:
          type: string
          enum: [customer, admin]
          example: customer
        is_active:
          type: boolean
          example: true
        email_verified_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-03-13T18:15:00Z'
        is_email_verified:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: '2026-03-13T18:10:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-03-13T18:15:00Z'
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access.signature
        refresh_token:
          type: string
          example: 1f9f7b7c-92a1-4c8f-b6de-bdfe94eebfef.secret
        token_type:
          type: string
          example: Bearer
        expires_in:
