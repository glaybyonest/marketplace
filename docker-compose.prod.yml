services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - backend

  migrate:
    image: ${API_IMAGE}
    container_name: marketplace-migrate-prod
    profiles: ["ops"]
    restart: "no"
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    command: ["/app/migrate", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  api:
    image: ${API_IMAGE}
    container_name: marketplace-api-prod
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "127.0.0.1:${API_BIND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: marketplace-prometheus-prod
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:${PROMETHEUS_BIND_PORT:-9090}:9090"
    volumes:
      - ./docker/monitoring/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/monitoring/prometheus/alerts.prod.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_prod_data:/prometheus
    depends_on:
      api:
        condition: service_started
      alertmanager:
        condition: service_started
    networks:
      - backend

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: marketplace-alertmanager-prod
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=${ALERTMANAGER_EXTERNAL_URL:-http://localhost:9093}"
    ports:
      - "127.0.0.1:${ALERTMANAGER_BIND_PORT:-9093}:9093"
    volumes:
      - ./docker/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_prod_data:/alertmanager
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.2.2
    container_name: marketplace-grafana-prod
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    ports:
      - "127.0.0.1:${GRAFANA_BIND_PORT:-3000}:3000"
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_prod_data:
  prometheus_prod_data:
  alertmanager_prod_data:
  grafana_prod_data:
