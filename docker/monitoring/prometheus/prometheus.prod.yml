global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    service: marketplace-backend
    environment: production

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: marketplace-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
