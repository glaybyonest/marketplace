global:
  resolve_timeout: 5m

route:
  receiver: "ops-webhook"
  group_by: ["alertname", "service", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "ops-webhook"
    webhook_configs:
      - url: "https://alerts.example.com/webhook"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "service"]
